<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация успешна — MyHealth</title>
  <link rel="stylesheet" href="css/core.css">
  <link rel="stylesheet" href="css/auth.css">
</head>

<body class="layout layout--auth layout--auth-modal">
  <div class="modal-overlay modal-overlay--open modal-overlay--auth-modal" aria-hidden="false" role="dialog"
    aria-labelledby="register-success-title">
    <div class="modal modal--auth modal--auth-success">
      <div class="auth-modal auth-modal--success">
        <div class="logo logo--card">
          <img class="logo__img" src="images/logo.png" alt="MyHealth">
        </div>
        <div class="auth-modal__card card">
          <h1 class="auth-modal__title" id="register-success-title">Аккаунт успешно создан!</h1>
          <p class="auth-modal__subtitle">Присоединяйтесь к MyHealth</p>
          <a href="index.html" class="btn btn--primary" id="register-success-login">Войти в личный кабинет</a>
        </div>
      </div>
    </div>
  </div>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
