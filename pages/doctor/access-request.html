<script>location.replace('../../index.html#/doctor/access/request');</script>
<main class="layout__content doctor-access-request-page">
  <a href="access.html" class="doctor-access-request-page__back btn btn--ghost" data-nav>
    <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
        stroke-linejoin="round" />
    </svg>
    Назад к доступам
  </a>

  <article class="card doctor-access-request">
    <header class="doctor-access-request__header">
      <h1 class="doctor-access-request__title title title--h1">Запрос доступа</h1>
    </header>

    <form class="doctor-access-request__form" data-doctor-access-request-form novalidate>
      <div class="field">
        <label class="field__label" for="patient-access-id">Email пациента или код доступа</label>
        <input class="field__input form-input" type="text" id="patient-access-id" name="patient"
          placeholder="ivanov@clinic.com или ABC-1234" autocomplete="off" required>
      </div>

      <div class="field">
        <span class="field__label" id="patient-doc-label">Выбрать документ</span>
        <button type="button" class="doctor-access-request__doc-btn" aria-labelledby="patient-doc-label"
          data-action="doctor-access-pick-doc">
          Выбрать документ пациента
        </button>
      </div>

      <div class="field">
        <span class="field__label">Срок доступа</span>
        <div class="segmented" data-segmented role="group" aria-label="Срок доступа">
          <button type="button" class="segmented__btn" data-segment="7">7 дней</button>
          <button type="button" class="segmented__btn segmented__btn--active" data-segment="30">30 дней</button>
          <button type="button" class="segmented__btn" data-segment="90">3 месяца</button>
        </div>
      </div>

      <button type="submit" class="btn btn--primary btn--md doctor-access-request__submit">Отправить запрос</button>
    </form>
  </article>
</main>
