<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Восстановление пароля — MyHealth</title>
  <link rel="stylesheet" href="css/core.css">
  <link rel="stylesheet" href="css/auth.css">
</head>

<body class="layout layout--auth layout--auth-page">
  <div class="modal-overlay modal-overlay--open modal-overlay--auth-page" aria-hidden="false" role="dialog"
    aria-labelledby="modal-password-title">
    <div class="modal modal--auth-card">
      <div class="auth-modal auth-modal--card">
        <div class="auth-modal__logo">
          <img src="images/logo.svg" alt="MyHealth" width="198" height="48">
        </div>
        <header class="auth-modal__header">
          <h1 class="auth-modal__title" id="modal-password-title">Восстановление пароля</h1>
          <p class="auth-modal__subtitle">Введите email, указанный при регистрации. Мы отправим ссылку для
            восстановления.</p>
        </header>
        <form class="auth__form auth-modal__form" id="password-form" action="#/login" method="get">
          <div class="field">
            <label class="field__label" for="reset-email">Email</label>
            <div class="field__wrap form-input-wrap">
              <span class="field__icon form-input-wrap__icon">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"
                  aria-hidden="true">
                  <path fill-rule="evenodd" clip-rule="evenodd"
                    d="M3.4375 4.375C2.91973 4.375 2.5 4.79473 2.5 5.3125V14.6875C2.5 15.2053 2.91973 15.625 3.4375 15.625H16.5625C17.0803 15.625 17.5 15.2053 17.5 14.6875V5.3125C17.5 4.79473 17.0803 4.375 16.5625 4.375H3.4375ZM1.25 5.3125C1.25 4.10438 2.22938 3.125 3.4375 3.125H16.5625C17.7706 3.125 18.75 4.10438 18.75 5.3125V14.6875C18.75 15.8956 17.7706 16.875 16.5625 16.875H3.4375C2.22938 16.875 1.25 15.8956 1.25 14.6875V5.3125Z"
                    fill="#767676" />
                  <path fill-rule="evenodd" clip-rule="evenodd"
                    d="M3.88168 5.86632C4.0936 5.59385 4.48627 5.54476 4.75874 5.75668L10 9.83324L15.2413 5.75668C15.5138 5.54476 15.9065 5.59385 16.1184 5.86632C16.3303 6.13878 16.2812 6.53146 16.0087 6.74337L10.3837 11.1184C10.158 11.2939 9.84201 11.2939 9.61632 11.1184L3.99132 6.74337C3.71885 6.53146 3.66976 6.13878 3.88168 5.86632Z"
                    fill="#767676" />
                </svg>
              </span>
              <input class="field__input form-input form-input--icon-left" type="email" id="reset-email" name="email"
                value="anna@gmail.com" required>
            </div>
          </div>
        </form>
        <div class="auth-modal__actions">
          <button type="submit" class="btn btn--success auth-modal__submit" form="password-form">Отправить
            ссылку</button>
        </div>
        <div class="auth-modal__footer">
          <a href="#/login" class="link auth-modal__back-link" data-nav>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true">
              <path d="M8.75 2.625L4.375 7l4.375 4.375" stroke="#156B6A" stroke-width="1.5" stroke-linecap="round"
                stroke-linejoin="round" />
            </svg>
            Вернуться к входу
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
